<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>
    <link rel="icon" href="assets/imagenes/logo.svg">
    <meta name="author" content="Emilia Orozco">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/index.css">


</head>
<body>
    <header>
        <div class="encabezado">
            <img src="assets/imagenes/logo.svg" alt="imagen de un vaso de cafe con una dona" class="icono-encabezado">
            <h1>Panadería Casera</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="misionVision.html" target="_blank">Misión y Visión</a></li>
                <li><a href="pedidos.html" target="_blank">Hacer Pedido</a></li>
                <li><a href="informacion.html" target="_blank">Información</a></li>
            </ul>
        </nav>
    </header>
    <main>
        
        <!-- Formulario para realizar pedidos -->
        <section class="formulario">
            <form action="hacerPedido" method="post">
                <fieldset>
                    <legend>Hacer Pedido</legend><br>
                    <label for="name">Nombre: </label>
                    <input type="text" name="name" id="name" required><br><br>
                    <label for="email">Ingrese su email: </label>
                    <input type="email" name="email" id="email" required placeholder="ejemplo@dominio.com"><br><br>
                    <label for="number">Ingrese su número de teléfono: </label>
                    <input type="number" name="number" id="number" required><br><br>
                    <label for="opciones">Que tipo de pan deseas: </label>
                    <input list="opciones" placeholder="Seleccione o escriba" />
                    <datalist name="opciones" id="opciones">
                        <option value="Pancakes con miel de maple"></option>
                        <option value="Tostadas francesas"></option>
                        <option value="Quiché de palmito"></option>
                        <option value="Sandwich de pan integral"></option>
                    </datalist><br><br>
                    <label for="mensaje">Mensaje opcional: </label>
                    <textarea name="mensaje" id="mensaje" rows="20" cols="100"></textarea><br><br>
                    <button class="enviar">Enviar Pedido</button>
                </fieldset>
            </form>
        </section>

    </main>
    <!-- Pie de página -->
    <footer>
        <h3>Contáctenos <i class="fa fa-envelope" aria-hidden="true"></i></h3>
       <div class="contactenos">
         <nav class="enlaces">
            <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            <a href="https://www.github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
        </nav>
        <nav class="contacto">
            <i class="fa fa-phone" aria-hidden="true"><p>7270-6979</p></i>
            <i class="fa fa-location-arrow" aria-hidden="true"><p>Sarchí Norte</p></i>
        </nav>
       </div>
        <p>&copy; Panadería Casera. Todos los derechos reservados</p><br><br><br>
    </footer>

</body>

</html>
